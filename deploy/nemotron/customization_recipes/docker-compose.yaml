# =============================================================================
# Nemotron Customization Recipes — Multi-Container Docker Compose
#
# Five services, each with a dedicated role:
#   1. nemotron-orchestrator  — Lightweight CLI, routes work to other services
#   2. nemotron-curator       — Data acquisition, translation, SDG, BYOB, quality
#   3. nemotron-trainer       — CPT, SFT, RL training (GPU)
#   4. nemotron-evaluator     — Model evaluation, benchmarks (GPU)
#   5. nemotron-nim           — Local NIM inference (optional, GPU)
#
# Usage:
#   cd deploy/nemotron/customization_recipes
#
#   # Start core services (orchestrator + curator + trainer + evaluator):
#   docker compose up -d
#
#   # Start with local NIM inference:
#   docker compose --profile with-nim up -d
#
#   # Run any customization command from the orchestrator (auto-dispatched):
#   docker compose exec nemotron-orchestrator nemotron customize sft -c default
#   docker compose exec nemotron-orchestrator nemotron customize data-prep -c default
#   docker compose exec nemotron-orchestrator nemotron customize eval -c default
#
#   # The orchestrator automatically routes to the correct container:
#   #   data-prep, sdg, byob  ->  nemotron-curator
#   #   cpt, sft, rl, quantize ->  nemotron-trainer
#   #   eval                   ->  nemotron-evaluator
#
# Override UID/GID for your host user:
#   REMOTE_UID=$(id -u) REMOTE_GID=$(id -g) docker compose up -d
# =============================================================================

name: nemotron-customize

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------

services:

  # =========================================================================
  # 1. Orchestrator — Lightweight CLI + orchestration
  # =========================================================================
  nemotron-orchestrator:
    build:
      context: ../../..
      dockerfile: deploy/nemotron/customization_recipes/Dockerfile
      args:
        REMOTE_USER: ${REMOTE_USER:-nemotron}
        REMOTE_UID: ${REMOTE_UID:-1000}
        REMOTE_GID: ${REMOTE_GID:-1000}
    image: nemotron-orchestrator:latest
    environment:
      - NGC_API_KEY=${NGC_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      # Dispatcher: marks this as orchestrator so commands are routed to siblings
      - NEMOTRON_ORCHESTRATOR=1
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-nemotron-customize}
      # Service discovery within the compose network
      - CURATOR_HOST=nemotron-curator
      - TRAINER_HOST=nemotron-trainer
      - EVALUATOR_HOST=nemotron-evaluator
      - NIM_HOST=nemotron-nim
    volumes:
      - ${DATA_DIR:-./data}:/workspace/data
      - ${MODELS_DIR:-./models}:/workspace/models
      - ${RESULTS_DIR:-./results}:/workspace/results
      # Docker socket for orchestrating other containers
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nemotron-net
    stdin_open: true
    tty: true

  # =========================================================================
  # 2. Curator — Data processing (acquisition, translation, SDG, BYOB, quality)
  # =========================================================================
  nemotron-curator:
    build:
      context: ../../..
      dockerfile: deploy/nemotron/customization_recipes/services/curator/Dockerfile
      args:
        REMOTE_USER: ${REMOTE_USER:-nemotron}
        REMOTE_UID: ${REMOTE_UID:-1000}
        REMOTE_GID: ${REMOTE_GID:-1000}
    image: nemotron-curator:latest
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NGC_API_KEY=${NGC_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      # NIM endpoint for LLM-backed operations (SDG, BYOB, translation)
      - NIM_ENDPOINT=http://nemotron-nim:8000/v1
    volumes:
      - ${DATA_DIR:-./data}:/workspace/data
      - ${MODELS_DIR:-./models}:/workspace/models
      - ${RESULTS_DIR:-./results}:/workspace/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - nemotron-net
    stdin_open: true
    tty: true

  # =========================================================================
  # 3. Trainer — Model training (CPT, SFT, RL)
  # =========================================================================
  nemotron-trainer:
    build:
      context: ../../..
      dockerfile: deploy/nemotron/customization_recipes/services/trainer/Dockerfile
      args:
        REMOTE_USER: ${REMOTE_USER:-nemotron}
        REMOTE_UID: ${REMOTE_UID:-1000}
        REMOTE_GID: ${REMOTE_GID:-1000}
    image: nemotron-trainer:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NGC_API_KEY=${NGC_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    volumes:
      - ${DATA_DIR:-./data}:/workspace/data
      - ${MODELS_DIR:-./models}:/workspace/models
      - ${RESULTS_DIR:-./results}:/workspace/results
    shm_size: "16g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - nemotron-net
    stdin_open: true
    tty: true

  # =========================================================================
  # 4. Evaluator — Model evaluation + sovereign benchmarks
  # =========================================================================
  nemotron-evaluator:
    build:
      context: ../../..
      dockerfile: deploy/nemotron/customization_recipes/services/evaluator/Dockerfile
      args:
        REMOTE_USER: ${REMOTE_USER:-nemotron}
        REMOTE_UID: ${REMOTE_UID:-1000}
        REMOTE_GID: ${REMOTE_GID:-1000}
    image: nemotron-evaluator:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NGC_API_KEY=${NGC_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      # NIM endpoint for LLM-as-judge evaluation
      - NIM_ENDPOINT=http://nemotron-nim:8000/v1
    volumes:
      - ${DATA_DIR:-./data}:/workspace/data
      - ${MODELS_DIR:-./models}:/workspace/models
      - ${RESULTS_DIR:-./results}:/workspace/results
    shm_size: "16g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - nemotron-net
    stdin_open: true
    tty: true

  # =========================================================================
  # 5. NIM — Local LLM inference (optional, activate with --profile with-nim)
  # =========================================================================
  nemotron-nim:
    image: nvcr.io/nim/mistralai/mistral-7b-instruct-v0.3:1.12.0
    profiles:
      - with-nim
    environment:
      - NGC_API_KEY=${NGC_API_KEY:-}
      - NIM_MAX_MODEL_LEN=4096
    ports:
      - "8000:8000"
    volumes:
      - ${NIM_CACHE_DIR:-nim-cache}:/opt/nim/.cache
    shm_size: "16g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - nemotron-net

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------

networks:
  nemotron-net:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes (for NIM model cache persistence)
# ---------------------------------------------------------------------------

volumes:
  nim-cache:
    driver: local
