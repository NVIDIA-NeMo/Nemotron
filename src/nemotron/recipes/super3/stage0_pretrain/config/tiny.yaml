run:
  data: super3-pretrain-data-tiny:latest
  env:
    container: nvcr.io/nvidian/nemo:26.02.super.rc4

recipe:
  # TODO(super3): Replace with nemotron_3_super_pretrain_config once ready (needs 4 nodes)
  _target_: megatron.bridge.recipes.nemotronh.nemotron_3_nano.nemotron_3_nano_pretrain_config

data:
  per_split_data_args_path: ${art:data,path}/blend.json

train:
  train_iters: 1700
  global_batch_size: 32

scheduler:
  lr_warmup_iters: 32

logger:
  log_interval: 10
  wandb_project: ${run.wandb.project}
  wandb_entity: ${run.wandb.entity}

checkpoint:
  save: /nemo_run/super3-pretrain-model-tiny
  save_interval: 20
