[project]
name = "recipe-runner"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
  "nemo-automodel @ git+https://github.com/NVIDIA-NeMo/Automodel.git@ecd7cb4297ae06990c94b7581f34c03ce8ed5488",
  # Needed by Nemotron library (added via --with flag)
  "omegaconf>=2.3.0",
  "pydantic-settings>=2.0.0",
  # Pin transformers <5.2 — nemo-automodel's check_model_inputs decorator
  # is a ContextDecorator in 5.2.0 which breaks biencoder forward()
  "transformers>=5.0,<5.2",
]

# Note: exclude-dependencies are injected dynamically by run_uv.py for Docker/Slurm
# This base config works for local mode where all packages need to be installed

# Pin torch to the cu129 wheel on Linux so installs work on hosts with
# CUDA 12.9 drivers. cu129 is forward-compatible with cu13.x drivers
# (newer drivers run older toolkit binaries). Matches nemo-automodel's
# torch source mapping to avoid resolver conflicts.
[tool.uv.sources]
torch = [
    { index = "pytorch-cu129", marker = "sys_platform == 'linux'" },
]

[[tool.uv.index]]
name = "pytorch-cu129"
url = "https://download.pytorch.org/whl/cu129"
explicit = true

[tool.nemotron]
entry-point = "train.py"
container-exclude-dependencies = [
    "torch",
    "torchao",
    "torchvision",
    "flash-attn",
    "triton",
    "pyarrow",
    "scipy",
    "opencv-python-headless",
]
