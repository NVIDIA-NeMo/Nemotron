[project]
name = "recipe-runner-sdg"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    # Vendored retriever-sdg (installed via path source below)
    "retriever-sdg",
    # Needed by Nemotron library (added via --with flag)
    "omegaconf>=2.3.0",
    "pydantic-settings>=2.0.0",
]

# Pin torch to the cu129 wheel on Linux so installs work on hosts with
# CUDA 12.9 drivers. cu129 is forward-compatible with cu13.x drivers
# (newer drivers run older toolkit binaries). Matches nemo-automodel's
# torch source mapping to avoid resolver conflicts.
[tool.uv.sources]
# Point to vendored retriever-sdg package
retriever-sdg = { path = "vendor/retriever-sdg", editable = true }
torch = [
    { index = "pytorch-cu129", marker = "sys_platform == 'linux'" },
]

[[tool.uv.index]]
name = "pytorch-cu129"
url = "https://download.pytorch.org/whl/cu129"
explicit = true

[tool.uv.extra-build-dependencies]
# Build dependencies for vendored packages
retriever-sdg = ["hatchling"]

# Note: exclude-dependencies are injected dynamically by run_uv.py for Docker/Slurm
# This base config works for local mode where all packages need to be installed

[tool.nemotron]
entry-point = "data_prep.py"
container-exclude-dependencies = [
    "torch",
    "torchvision",
    "flash-attn",
    "triton",
    "pyarrow",
    "scipy",
    "opencv-python-headless",
]
