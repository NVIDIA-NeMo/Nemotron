stage: mpo
dataset_name: mmpr_public
source_uri: hf://OpenGVLab/MMPR
input_dir: ${oc.env:OMNI3_MMPR_PUBLIC_RAW,data/mmpr_public/raw}
input_file: null
output_dir: ${oc.env:NEMO_RUN_DIR,.}/stage1_rl/data_prep/mpo/MMPR-v1.2
meta_name: meta_public.json
train_file_name: train.jsonl
val_file_name: val.jsonl
validation_strategy: same_as_train
builder_command: >-
  uvx --with tqdm python scripts/prepare_public_mmpr_for_mpo.py
  --input-dir {input_dir}
  --output-dir {output_dir}
  --meta-name {meta_name}
force: false
