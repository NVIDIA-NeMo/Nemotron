# =============================================================================
# CPT Training Config — Nemotron
# =============================================================================

# Model
model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  torch_dtype: bf16
  trust_remote_code: true

# Training schedule
step_scheduler:
  global_batch_size: 64
  local_batch_size: 1
  ckpt_every_steps: 250
  val_every_steps: 50
  max_steps: 500

# Distributed
dist_env:
  backend: nccl
  timeout_minutes: 5

distributed:
  _target_: nemo_automodel.components.distributed.fsdp2.FSDP2Manager
  dp_size: none
  tp_size: 1
  cp_size: 1
  pp_size: 1
  sequence_parallel: false

# RNG
rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

# Checkpoint
checkpoint:
  enabled: true
  checkpoint_dir: ./output/cpt_checkpoints  # REPLACE with your path
  model_save_format: torch_save
  save_consolidated: false

# Loss
loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

# Dataset — Megatron-style tokenized data (bin/idx)
dataset:
  _target_: nemo_automodel.components.datasets.llm.megatron_dataset.MegatronPretraining
  paths: ./output/cpt_data_prep/*_text_document*  # REPLACE
  index_mapping_dir: ./output/cpt_data_prep/index_mapping  # REPLACE
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  seq_length: 8192
  split: "0.99, 0.01, 0.00"
  splits_to_build: train

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.megatron_dataset.MegatronPretraining
  paths: ${dataset.paths}
  index_mapping_dir: ${dataset.index_mapping_dir}
  tokenizer: ${dataset.tokenizer}
  split: "0.99, 0.01, 0.00"
  splits_to_build: validation

# Dataloaders
dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: torch.utils.data.default_collate
  dataloader_type: single

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: torch.utils.data.default_collate
  dataloader_type: single

# Optimizer
optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 1.0e-5
  weight_decay: 0.01

# W&B (optional)
wandb:
  project: nemotron-customization
  entity: null
  name: nemotron-cpt
