# =============================================================================
# CPT Training Config — Nemotron (Megatron-Bridge)
# =============================================================================
# Continued pretraining on domain/language-specific corpora.
# Follows the same Megatron-Bridge config pattern as nano3/super3 recipes.

run:
  data: cpt-data:latest                    # Data artifact (bin/idx blends from data_prep)
  model: null                              # Base model (downloaded from HF if null)
  env:
    container: nvcr.io/nvidia/nemo:25.11.nemotron_3_nano

recipe:
  _target_: megatron.bridge.recipes.nemotronh.nemotron_3_nano.nemotron_3_nano_pretrain_config
  per_split_data_args_path: ${art:data,path}/blend.json

train:
  train_iters: 10000                       # Adjust based on data volume (5000-50000)
  global_batch_size: 256                   # Tokens per step = GBS * seq_length
  micro_batch_size: 1

model:
  seq_length: 4096
  tensor_model_parallel_size: 4
  pipeline_model_parallel_size: 1
  context_parallel_size: 2

optimizer:
  lr: 1e-5                                 # Lower than pretrain (avoid forgetting)
  min_lr: 1e-6
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  clip_grad: 1.0

scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 100

logger:
  log_interval: 10
  wandb_project: ${run.wandb.project}      # Set from env.toml [wandb]
  wandb_entity: ${run.wandb.entity}        # Set from env.toml [wandb]

checkpoint:
  save: /results/cpt_checkpoint
  save_interval: 1000
  load: null                               # Set to resume from a checkpoint
