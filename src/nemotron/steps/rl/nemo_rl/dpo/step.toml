[step]
id = "rl/nemo_rl/dpo"
name = "RL — DPO (NeMo-RL)"
category = "rl"
description = """\
Direct Preference Optimisation alignment with NeMo-RL. Consumes a preference
dataset (chosen / rejected pairs) and an SFT-trained checkpoint."""
tags = ["rl", "dpo", "alignment", "nemo-rl"]

[[consumes]]
type = "training_jsonl"
description = "Preference JSONL with prompt + chosen + rejected fields."
required = true

[[consumes]]
type = "checkpoint_megatron"
description = "SFT-trained policy to align."
required = true

[[produces]]
type = "checkpoint_megatron"
description = "DPO-aligned checkpoint."

[[parameters]]
name = "dpo.reference_policy_kl_penalty"
description = "KL penalty against the reference policy (β in DPO)."
default = 0.05

[[strategies]]
when = "Loss diverges or KL collapses"
then = "Increase reference_policy_kl_penalty (0.1-0.3) or lower the learning rate."

[reference]
script = "https://github.com/NVIDIA-NeMo/RL/blob/main/examples/run_dpo.py"
skills = ["skills/nemotron-customize/context/nemo-rl-alignment.txt"]
