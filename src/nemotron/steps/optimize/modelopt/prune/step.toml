[step]
id = "optimize/modelopt/prune"
name = "Pruning (ModelOpt Minitron)"
category = "optimize"
description = """\
Prune a HuggingFace model with NVIDIA Model Optimizer's Minitron flow in the
Megatron-Bridge framework. Supports target-parameter search or manual architecture
pruning via prune_export_config."""
tags = ["optimize", "modelopt", "pruning", "minitron", "megatron-bridge"]

[[consumes]]
type = "checkpoint_hf"
description = "HuggingFace model or checkpoint to prune."
required = true

[[produces]]
type = "checkpoint_hf"
description = "Pruned HuggingFace checkpoint."

[[parameters]]
name = "prune_target_params"
description = "Target parameter count for search, e.g. 6e9."
default = 6e9

[[parameters]]
name = "prune_export_config"
description = "Manual architecture dict such as hidden_size / ffn_hidden_size / num_layers."

[[parameters]]
name = "hparams_to_skip"
description = "Architecture hparams to leave untouched, e.g. num_attention_heads."

[[parameters]]
name = "extra_args"
description = "Raw upstream prune_minitron.py args for newly added ModelOpt flags."
default = []

[[strategies]]
when = "You know the target model budget"
then = "Set prune_target_params and leave prune_export_config null so Minitron searches candidates."

[[strategies]]
when = "You need a specific architecture"
then = "Set prune_export_config and set prune_target_params=null."

[[strategies]]
when = "Layer count does not divide PP size"
then = "Use num_layers_in_first_pipeline_stage / num_layers_in_last_pipeline_stage for uneven PP."

[reference]
modelopt_megatron_bridge = "https://github.com/NVIDIA/Model-Optimizer/blob/main/examples/megatron_bridge/README.md"
modelopt = "https://github.com/NVIDIA/Model-Optimizer"
skills = ["skills/nemotron-customize/context/modelopt-optimization.txt"]
